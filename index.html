<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>School Helper SaaS</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

/* LOGIN */
.center {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card {
  background:#1f2937;
  padding:25px;
  border-radius:12px;
  width:320px;
  text-align:center;
}

input, select {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#0b1220;
  color:white;
}

button {
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  font-weight:bold;
  cursor:pointer;
}

.link {
  margin-top:10px;
  font-size:12px;
  color:#93c5fd;
  cursor:pointer;
}

/* APP */
.app {
  display:flex;
  height:100vh;
}

.sidebar {
  width:220px;
  background:#111827;
  padding:15px;
}

.sidebar button {
  width:100%;
  margin:8px 0;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1f2937;
  color:white;
  cursor:pointer;
}

.sidebar button:hover { background:#334155; }

.main {
  flex:1;
  padding:20px;
}

.box {
  background:#1f2937;
  padding:15px;
  border-radius:10px;
}

textarea {
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:8px;
  border:none;
  background:#0b1220;
  color:white;
}

.note {
  background:#111827;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

.hidden { display:none; }
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth" class="center">
  <div class="card">
    <h2 id="title">Login</h2>

    <input id="email" placeholder="Email"/>
    <input id="password" type="password" placeholder="Password"/>

    <button onclick="auth()">Continue</button>

    <div class="link" onclick="toggle()">Switch login / signup</div>
    <div class="link" onclick="forgot()">Forgot password?</div>
  </div>
</div>

<!-- APP -->
<div id="app" class="app hidden">

  <div class="sidebar">
    <h3>📚 SaaS</h3>
    <button onclick="show('notes')">Notes</button>
    <button onclick="show('calc')">Calculator</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="main">

    <!-- NOTES -->
    <div id="notes" class="section">
      <div class="box">
        <h2>Cloud Notes ☁️</h2>

        <input id="ntitle" placeholder="Title"/>
        <textarea id="ncontent" placeholder="Write note..."></textarea>
        <button onclick="addNote()">Save</button>

        <div id="list"></div>
      </div>
    </div>

    <!-- CALCULATOR -->
    <div id="calc" class="section hidden">
      <div class="box">
        <h2>Calculator 🧮</h2>

        <input id="nums" placeholder="Numbers: 5,10,20"/>

        <select id="op">
          <option value="sum">Sum</option>
          <option value="avg">Average</option>
          <option value="sqrt">Square root (first)</option>
          <option value="square">Square (first)</option>
          <option value="max">Max</option>
          <option value="min">Min</option>
        </select>

        <button onclick="calc()">Calculate</button>

        <h3 id="res"></h3>
      </div>
    </div>

  </div>
</div>

<!-- SUPABASE -->
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://tvjzmjahyipbihvkemkd.supabase.co",
  "sb_publishable_ND5M0H9tuFmirts34peHPA_3pwCD-1l"
);

let user = null;
let signupMode = false;

/* SESSION */
const session = await supabase.auth.getSession();
if (session.data.session) {
  user = session.data.session.user;
  openApp();
}

/* AUTH */
window.auth = async () => {
  const email = emailEl().value;
  const password = passEl().value;

  if (signupMode) {
    const { error } = await supabase.auth.signUp({ email, password });
    alert(error ? error.message : "Check email to confirm account.");
    return;
  }

  const { data, error } = await supabase.auth.signInWithPassword({
    email, password
  });

  if (error) return alert(error.message);

  user = data.user;
  openApp();
};

/* FORGOT */
window.forgot = async () => {
  const email = emailEl().value;
  if (!email) return alert("Enter email first");

  await supabase.auth.resetPasswordForEmail(email);
  alert("Reset email sent");
};

/* TOGGLE */
window.toggle = () => {
  signupMode = !signupMode;
  document.getElementById("title").innerText =
    signupMode ? "Sign Up" : "Login";
};

/* LOGOUT */
window.logout = async () => {
  await supabase.auth.signOut();
  location.reload();
};

/* OPEN APP */
function openApp() {
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  loadNotes();
}

/* NOTES */
window.addNote = async () => {
  await supabase.from("notes").insert([{
    title: document.getElementById("ntitle").value,
    content: document.getElementById("ncontent").value,
    user_id: user.id
  }]);

  loadNotes();
};

window.loadNotes = async () => {
  const { data } = await supabase
    .from("notes")
    .select("*")
    .eq("user_id", user.id);

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(n => {
    const div = document.createElement("div");
    div.className = "note";
    div.innerHTML = `<b>${n.title}</b><br>${n.content}`;
    list.appendChild(div);
  });
};

/* CALCULATOR */
window.calc = () => {
  const nums = document.getElementById("nums").value
    .split(",")
    .map(n => Number(n.trim()))
    .filter(n => !isNaN(n));

  const op = document.getElementById("op").value;

  let r = 0;

  if (op === "sum") r = nums.reduce((a,b)=>a+b,0);
  if (op === "avg") r = nums.reduce((a,b)=>a+b,0)/nums.length;
  if (op === "sqrt") r = Math.sqrt(nums[0]);
  if (op === "square") r = nums[0]*nums[0];
  if (op === "max") r = Math.max(...nums);
  if (op === "min") r = Math.min(...nums);

  document.getElementById("res").innerText = "Result: " + r;
};

/* NAV */
window.show = (id) => {
  document.querySelectorAll(".section").forEach(s => s.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
};

/* HELPERS */
const emailEl = () => document.getElementById("email");
const passEl = () => document.getElementById("password");
</script>

</body>
</html>
