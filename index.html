<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>School Helper - Cloud Notes</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      min-height: 100vh;
      background: #0f172a;
      color: #e2e8f0;
    }

    .sidebar {
      width: 240px;
      background: #111827;
      padding: 20px;
    }

    .sidebar h2 {
      color: #38bdf8;
      margin-bottom: 20px;
    }

    .nav-btn {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      background: #1f2937;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
    }

    .nav-btn:hover {
      background: #334155;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    .card {
      background: #1f2937;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #0b1220;
      color: white;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #38bdf8;
      font-weight: bold;
    }

    .note {
      background: #111827;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }

    .note button {
      background: #ef4444;
      margin-top: 8px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>📚 School Helper</h2>
  <button class="nav-btn" onclick="show('home')">Home</button>
  <button class="nav-btn" onclick="show('notes')">Cloud Notes</button>
</div>

<div class="main">

  <div id="home" class="section">
    <div class="card">
      <h2>Welcome 👋</h2>
      <p>Cloud-powered school helper dashboard.</p>
    </div>
  </div>

  <div id="notes" class="section hidden">
    <div class="card">
      <h2>Cloud Notes ☁️</h2>

      <input id="title" placeholder="Title"/>
      <textarea id="content" placeholder="Write your note..."></textarea>

      <button onclick="addNote()">Save Note</button>

      <div id="list"></div>
    </div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    doc
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 🔴 REPLACE THIS WITH YOUR FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const notesRef = collection(db, "notes");

  window.addNote = async function () {
    const title = document.getElementById("title").value;
    const content = document.getElementById("content").value;

    if (!title || !content) return;

    await addDoc(notesRef, {
      title,
      content,
      time: Date.now()
    });

    document.getElementById("title").value = "";
    document.getElementById("content").value = "";

    loadNotes();
  };

  window.deleteNote = async function (id) {
    await deleteDoc(doc(db, "notes", id));
    loadNotes();
  };

  async function loadNotes() {
    const snap = await getDocs(notesRef);
    const list = document.getElementById("list");

    list.innerHTML = "";

    snap.forEach((d) => {
      const data = d.data();

      const div = document.createElement("div");
      div.className = "note";

      div.innerHTML = `
        <b>${data.title}</b>
        <p>${data.content}</p>
        <button onclick="deleteNote('${d.id}')">Delete</button>
      `;

      list.appendChild(div);
    });
  }

  window.show = function (id) {
    document.querySelectorAll(".section")
      .forEach(s => s.classList.add("hidden"));

    document.getElementById(id).classList.remove("hidden");

    if (id === "notes") loadNotes();
  };

  loadNotes();
</script>

</body>
</html>
