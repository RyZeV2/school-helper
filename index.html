<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>School Helper Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 240px;
      background: #111827;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 20px;
      font-size: 20px;
      color: #38bdf8;
    }

    .nav-btn {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      background: #1f2937;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 8px;
      text-align: left;
    }

    .nav-btn:hover {
      background: #334155;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    .card {
      background: #1f2937;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      background: #0b1220;
      color: white;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #38bdf8;
      color: black;
      font-weight: bold;
    }

    .hidden { display: none; }

    .notes-container {
      display: flex;
      gap: 20px;
    }

    .notes-list {
      width: 30%;
      background: #111827;
      padding: 10px;
      border-radius: 10px;
      max-height: 400px;
      overflow-y: auto;
    }

    .note-item {
      padding: 10px;
      margin-bottom: 8px;
      background: #1f2937;
      border-radius: 8px;
      cursor: pointer;
    }

    .note-item:hover {
      background: #334155;
    }

    .notes-editor {
      flex: 1;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2>📚 School Helper</h2>
    <button class="nav-btn" onclick="showSection('home')">🏠 Home</button>
    <button class="nav-btn" onclick="showSection('calc')">🧮 Calculator</button>
    <button class="nav-btn" onclick="showSection('notes')">📝 Notes</button>
  </div>

  <div class="main">

    <div id="home" class="section">
      <div class="card">
        <h2>Welcome 👋</h2>
        <p>Your school dashboard with useful tools.</p>
      </div>
    </div>

    <div id="calc" class="section hidden">
      <div class="card">
        <h2>Calculator</h2>
        <input id="calcInput" placeholder="e.g. 5+5*2" />
        <button onclick="calculate()">Calculate</button>
        <p id="result"></p>
      </div>
    </div>

    <div id="notes" class="section hidden">
      <div class="card">
        <h2>Advanced Notes</h2>
        <button onclick="createNote()">+ New Note</button>
        <div class="notes-container">

          <div class="notes-list" id="notesList"></div>

          <div class="notes-editor">
            <input id="noteTitle" placeholder="Title" />
            <textarea id="noteContent" placeholder="Write your note..."></textarea>
            <button onclick="saveNote()">Save</button>
            <button onclick="deleteNote()">Delete</button>
          </div>

        </div>
      </div>
    </div>

  </div>

<script>
let notes = JSON.parse(localStorage.getItem('notes')) || [];
let currentNoteId = null;

function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  if(id === 'notes') renderNotes();
}

function calculate(){
  try {
    document.getElementById('result').innerText = eval(document.getElementById('calcInput').value);
  } catch {
    document.getElementById('result').innerText = 'Error';
  }
}

function createNote(){
  const note = {id: Date.now(), title:'New Note', content:''};
  notes.push(note);
  currentNoteId = note.id;
  saveToStorage();
  renderNotes();
  loadNote(note.id);
}

function renderNotes(){
  const list = document.getElementById('notesList');
  list.innerHTML = '';
  notes.forEach(n=>{
    const div = document.createElement('div');
    div.className='note-item';
    div.innerText = n.title;
    div.onclick = ()=>loadNote(n.id);
    list.appendChild(div);
  });
}

function loadNote(id){
  const note = notes.find(n=>n.id===id);
  if(!note) return;
  currentNoteId = id;
  document.getElementById('noteTitle').value = note.title;
  document.getElementById('noteContent').value = note.content;
}

function saveNote(){
  const note = notes.find(n=>n.id===currentNoteId);
  if(!note) return;
  note.title = document.getElementById('noteTitle').value;
  note.content = document.getElementById('noteContent').value;
  saveToStorage();
  renderNotes();
}

function deleteNote(){
  notes = notes.filter(n=>n.id!==currentNoteId);
  currentNoteId = null;
  saveToStorage();
  renderNotes();
  document.getElementById('noteTitle').value='';
  document.getElementById('noteContent').value='';
}

function saveToStorage(){
  localStorage.setItem('notes', JSON.stringify(notes));
}
</script>

</body>
</html>
