<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stable SaaS</title>
<style>
body{font-family:Arial;background:#0b1220;color:white;margin:0}
.center{height:100vh;display:flex;justify-content:center;align-items:center}
.card{background:#111827;padding:20px;border-radius:10px;width:300px}
input,textarea{width:100%;margin-top:10px;padding:10px;border-radius:8px;border:none;background:#0f172a;color:white}
button{width:100%;margin-top:10px;padding:10px;background:#38bdf8;border:none;border-radius:8px}
.hidden{display:none}
.note{background:#111827;margin-top:5px;padding:10px;border-radius:8px}
.app{padding:20px}
</style>
</head>

<body>

<div id="auth" class="center">
  <div class="card">
    <h3>Login</h3>
    <input id="email">
    <input id="password" type="password">
    <button onclick="login()">Login</button>
  </div>
</div>

<div id="app" class="hidden app">
  <button onclick="logout()">Logout</button>

  <input id="title" placeholder="title">
  <textarea id="content"></textarea>
  <button onclick="save()">Save</button>

  <div id="list"></div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://tvjzmjahyipbihvkemkd.supabase.co",
  "sb_publishable_ND5M0H9tuFmirts34peHPA_3pwCD-1l"
);

let user=null;

/* SESSION */
const { data } = await supabase.auth.getSession();
if(data.session){
  user = data.session.user;
  open();
}

window.login = async () => {
  const { data, error } = await supabase.auth.signInWithPassword({
    email:email.value,
    password:password.value
  });

  if(error){
    alert(error.message);
    return;
  }

  user = data.user;
  open();
};

function open(){
  auth.classList.add("hidden");
  app.classList.remove("hidden");
  load();
}

window.logout = async () => {
  await supabase.auth.signOut();
  location.reload();
};

async function load(){
  const { data } = await supabase
    .from("notes")
    .select("*")
    .eq("user_id", user.id);

  list.innerHTML="";

  data.forEach(n=>{
    const d=document.createElement("div");
    d.className="note";
    d.innerText=n.title;
    list.appendChild(d);
  });
}

window.save = async () => {
  await supabase.from("notes").insert([{
    title:title.value,
    content:content.value,
    user_id:user.id
  }]);

  load();
};
</script>

</body>
</html>
