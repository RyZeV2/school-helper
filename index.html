<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Helper</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

/* LOGIN */
#loginScreen {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.loginBox {
  background:#1e293b;
  padding:30px;
  border-radius:12px;
  width:300px;
  text-align:center;
}

input, textarea {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#0b1220;
  color:white;
}

/* DASHBOARD */
#app {
  display:none;
  height:100vh;
}

.sidebar {
  width:240px;
  background:#111827;
  padding:20px;
  float:left;
  height:100vh;
}

.main {
  margin-left:240px;
  padding:20px;
}

button {
  padding:10px;
  margin-top:10px;
  background:#38bdf8;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.note {
  background:#1e293b;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

.small {
  opacity:0.7;
  font-size:12px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="loginBox">
    <h2>📚 School Helper</h2>
    <p class="small">Sign in to continue</p>

    <input id="username" placeholder="Username">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div class="sidebar">
    <h3>📚 Dashboard</h3>
    <button onclick="showTab('notes')">Notes</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="main">

    <h2>Welcome 👋 <span id="user"></span></h2>
    <p class="small">Modern school productivity dashboard</p>

    <!-- NOTES -->
    <div id="notesTab">

      <h3>📝 Notes</h3>

      <input id="title" placeholder="Title">
      <textarea id="content" placeholder="Write note..."></textarea>
      <button onclick="addNote()">Save</button>

      <input id="search" placeholder="Search notes..." oninput="renderNotes()">

      <div id="notesList"></div>
    </div>

  </div>
</div>

<script>
let currentUser = null;
let notes = JSON.parse(localStorage.getItem("notes") || "[]");

/* LOGIN */
function login() {
  const u = document.getElementById("username").value;
  if(!u) return;

  currentUser = u;
  document.getElementById("user").innerText = u;

  document.getElementById("loginScreen").style.display="none";
  document.getElementById("app").style.display="block";

  renderNotes();
}

function logout() {
  location.reload();
}

/* NOTES */
function addNote() {
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;

  notes.push({
    id: Date.now(),
    title,
    content,
    user: currentUser
  });

  localStorage.setItem("notes", JSON.stringify(notes));

  document.getElementById("title").value="";
  document.getElementById("content").value="";

  renderNotes();
}

function renderNotes() {
  const list = document.getElementById("notesList");
  const search = document.getElementById("search").value.toLowerCase();

  list.innerHTML="";

  notes
    .filter(n => n.user === currentUser)
    .filter(n => n.title.toLowerCase().includes(search) || n.content.toLowerCase().includes(search))
    .forEach(n => {
      const div = document.createElement("div");
      div.className="note";
      div.innerHTML = `<b>${n.title}</b><br>${n.content}`;
      list.appendChild(div);
    });
}

function showTab(tab){
  alert("Only Notes implemented for now");
}
</script>

</body>
</html>
