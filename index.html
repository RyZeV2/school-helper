<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>School SaaS</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1220;
  color:white;
}

/* LOGIN */
.center {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card {
  background:#111827;
  padding:25px;
  border-radius:12px;
  width:320px;
  text-align:center;
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#0f172a;
  color:white;
}

button {
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  cursor:pointer;
  font-weight:bold;
}

/* APP */
.app {
  display:flex;
  height:100vh;
}

.sidebar {
  width:220px;
  background:#0f172a;
  padding:10px;
}

.main {
  flex:1;
  padding:15px;
}

.note {
  background:#111827;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  cursor:pointer;
}

textarea {
  width:100%;
  height:150px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#0f172a;
  color:white;
  padding:10px;
}

.hidden { display:none; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">
  <div class="card">
    <h2>Login</h2>

    <input id="email" placeholder="Email"/>
    <input id="password" type="password" placeholder="Password"/>

    <button onclick="auth()">Continue</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="app hidden">

  <div class="sidebar">
    <h3>📚 Notes</h3>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="main">

    <input id="title" placeholder="Title"/>
    <textarea id="content" placeholder="Write note..."></textarea>
    <button onclick="save()">Save</button>

    <div id="list"></div>

  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://tvjzmjahyipbihvkemkd.supabase.co",
  "sb_publishable_ND5M0H9tuFmirts34peHPA_3pwCD-1l"
);

let user = null;

/* SESSION CHECK */
const session = await supabase.auth.getSession();
if(session.data.session){
  user = session.data.session.user;
  openApp();
}

/* AUTH */
window.auth = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email, password
  });

  if(error){
    const r = await supabase.auth.signUp({ email, password });
    user = r.data.user;
  } else {
    user = data.user;
  }

  openApp();
};

window.logout = async () => {
  await supabase.auth.signOut();
  location.reload();
};

function openApp(){
  login.classList.add("hidden");
  app.classList.remove("hidden");
  load();
}

/* NOTES */
async function load(){
  const { data } = await supabase
    .from("notes")
    .select("*")
    .eq("user_id", user.id);

  list.innerHTML = "";

  data.forEach(n => {
    const div = document.createElement("div");
    div.className = "note";
    div.innerHTML = `<b>${n.title}</b><br>${n.content}`;
    list.appendChild(div);
  });
}

window.save = async () => {
  await supabase.from("notes").insert([{
    title: title.value,
    content: content.value,
    user_id: user.id
  }]);

  title.value = "";
  content.value = "";

  load();
};

/* PWA SAFE */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
