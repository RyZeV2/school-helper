<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>School SaaS</title>

<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

.center{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  background:#111827;
  padding:25px;
  border-radius:12px;
  width:320px;
  text-align:center;
}

input, textarea, select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#0f172a;
  color:white;
}

button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  cursor:pointer;
  font-weight:bold;
}

.app{
  display:flex;
  height:100vh;
}

.sidebar{
  width:240px;
  background:#0f172a;
  padding:10px;
}

.main{
  flex:1;
  display:flex;
}

.list{
  width:280px;
  border-right:1px solid #1f2937;
  overflow:auto;
}

.note{
  padding:10px;
  background:#111827;
  margin:5px;
  border-radius:8px;
  cursor:pointer;
}

.editor{
  flex:1;
  padding:20px;
}

.hidden{display:none;}

.install{
  position:fixed;
  bottom:20px;
  left:20px;
  right:20px;
  background:#111827;
  padding:10px;
  border-radius:10px;
  display:none;
  justify-content:space-between;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth" class="center">
  <div class="card">
    <h2>Login</h2>

    <input id="email" placeholder="Email"/>
    <input id="pass" type="password" placeholder="Password"/>

    <button onclick="login()">Continue</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="app hidden">

  <div class="sidebar">
    <h3>📚 School SaaS</h3>
    <button onclick="newNote()">+ New</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="main">

    <div class="list" id="list"></div>

    <div class="editor">
      <input id="title" placeholder="Title"/>
      <textarea id="content" placeholder="Note..."></textarea>
      <button onclick="save()">Save</button>
    </div>

  </div>

</div>

<!-- INSTALL -->
<div class="install" id="installBox">
  <span>📱 Install app</span>
  <button onclick="install()">Install</button>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://tvjzmjahyipbihvkemkd.supabase.co",
  "sb_publishable_ND5M0H9tuFmirts34peHPA_3pwCD-1l"
);

let user=null;
let notes=[];
let current=null;

/* SESSION */
const s = await supabase.auth.getSession();
if(s.data.session){
  user=s.data.session.user;
  open();
}

/* LOGIN */
window.login = async () => {
  const { data, error } = await supabase.auth.signInWithPassword({
    email:email.value,
    password:pass.value
  });

  if(error){
    const r = await supabase.auth.signUp({
      email:email.value,
      password:pass.value
    });
    user=r.data.user;
  } else {
    user=data.user;
  }

  open();
};

window.logout = async () => {
  await supabase.auth.signOut();
  location.reload();
};

function open(){
  auth.classList.add("hidden");
  app.classList.remove("hidden");
  load();
}

/* NOTES */
async function load(){
  const { data } = await supabase
    .from("notes")
    .select("*")
    .eq("user_id", user.id);

  notes=data;
  render();
}

function render(){
  list.innerHTML="";
  notes.forEach(n=>{
    const d=document.createElement("div");
    d.className="note";
    d.innerText=n.title;
    d.onclick=()=>openNote(n);
    list.appendChild(d);
  });
}

function openNote(n){
  current=n;
  title.value=n.title;
  content.value=n.content;
}

window.save = async () => {
  await supabase.from("notes").insert([{
    title:title.value,
    content:content.value,
    user_id:user.id
  }]);

  load();
};

window.newNote = () => {
  title.value="";
  content.value="";
};

/* PWA */
let deferred;

window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();
  deferred=e;
  installBox.style.display="flex";
});

window.install = async () => {
  deferred.prompt();
  deferred=null;
  installBox.style.display="none";
};

/* SW */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
