<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>School Helper SaaS</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#0f172a;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.sidebar button{
background:#111827;
}

/* MAIN */

.main{
flex:1;
padding:20px;
overflow:auto;
}

/* CARD */

.card{
background:#111827;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

input,textarea{
width:100%;
margin-top:10px;
padding:10px;
border:none;
border-radius:8px;
background:#0f172a;
color:white;
}

button{
width:100%;
margin-top:10px;
padding:10px;
border:none;
border-radius:8px;
background:#38bdf8;
cursor:pointer;
font-weight:bold;
}

.note{
background:#111827;
padding:10px;
margin-top:8px;
border-radius:8px;
}

/* LOGIN MODAL */

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

.modal{
width:320px;
background:#111827;
padding:20px;
border-radius:12px;
}

.link{
font-size:13px;
margin-top:10px;
cursor:pointer;
text-align:center;
color:#38bdf8;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="overlay" class="overlay">

<div class="modal">

<h3 id="modeTitle">Login</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<button onclick="signup()">Signup</button>

<button onclick="googleLogin()">
Continue with Google
</button>

<div class="link" onclick="forgotPassword()">
Forgot password?
</div>

<div id="status"></div>

</div>

</div>

<!-- SIDEBAR -->

<div class="sidebar">

<h3>📚 School</h3>

<button onclick="showNotes()">
Notes
</button>

<button onclick="showCalculator()">
Calculator
</button>

<button onclick="logout()">
Logout
</button>

</div>

<!-- MAIN -->

<div class="main">

<!-- NOTES -->

<div id="notesPage">

<div class="card">

<input id="title"
placeholder="Note title">

<textarea id="content"
placeholder="Write note...">
</textarea>

<button onclick="saveNote()">
Save Note
</button>

</div>

<div id="list"></div>

</div>

<!-- CALCULATOR -->

<div id="calculatorPage"
style="display:none;">

<div class="card">

<input id="calcInput"
placeholder="Example: sqrt(25)+5^2">

<button onclick="calculate()">
Calculate
</button>

<div id="calcResult"
style="margin-top:10px;">
</div>

</div>

</div>

</div>

<script type="module">

import { createClient }
from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
"https://tvjzmjahyipbihvkemkd.supabase.co",
"sb_publishable_ND5M0H9tuFmirts34peHPA_3pwCD-1l"
);

let user=null;

/* SESSION */

const { data } =
await supabase.auth.getSession();

if(data.session){

user=data.session.user;
overlay.style.display="none";
loadNotes();

}

/* LOGIN */

window.login = async ()=>{

status.innerText="Logging in...";

const { data, error } =
await supabase.auth.signInWithPassword({

email:email.value,
password:password.value

});

if(error){

status.innerText="❌ "+error.message;
return;

}

user=data.user;

overlay.style.display="none";

loadNotes();

};

/* SIGNUP */

window.signup = async ()=>{

status.innerText="Creating account...";

const { error } =
await supabase.auth.signUp({

email:email.value,
password:password.value

});

if(error){

status.innerText="❌ "+error.message;
return;

}

status.innerText=
"📧 Check email to confirm";

};

/* GOOGLE LOGIN */

window.googleLogin = async ()=>{

await supabase.auth.signInWithOAuth({

provider:"google",
options:{
redirectTo:
"https://ryzev2.github.io/school-helper/"
}

});

};

/* FORGOT */

window.forgotPassword = async ()=>{

const { error } =
await supabase.auth.resetPasswordForEmail(

email.value

);

if(error){

status.innerText="❌ Failed";
return;

}

status.innerText=
"📧 Reset email sent";

};

/* LOGOUT */

window.logout = async ()=>{

await supabase.auth.signOut();

location.reload();

};

/* NOTES */

async function loadNotes(){

const { data } =
await supabase
.from("notes")
.select("*")
.eq("user_id", user.id);

list.innerHTML="";

data.forEach(n=>{

const div =
document.createElement("div");

div.className="note";

div.innerHTML=
`<b>${n.title}</b><br>${n.content}`;

list.appendChild(div);

});

}

window.saveNote = async ()=>{

await supabase
.from("notes")
.insert([{

title:title.value,
content:content.value,
user_id:user.id

}]);

title.value="";
content.value="";

loadNotes();

};

/* NAVIGATION */

window.showNotes=()=>{

notesPage.style.display="block";
calculatorPage.style.display="none";

};

window.showCalculator=()=>{

notesPage.style.display="none";
calculatorPage.style.display="block";

};

/* CALCULATOR */

window.calculate=()=>{

let expr=calcInput.value;

expr=expr
.replace(/sqrt/g,"Math.sqrt")
.replace(/\^/g,"**");

try{

calcResult.innerText=
eval(expr);

}catch{

calcResult.innerText=
"Invalid expression";

}

};

</script>

</body>
</html>
