<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>School Helper SaaS</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  height:100vh;
}

.sidebar {
  width:220px;
  background:#111827;
  padding:15px;
}

.sidebar button {
  width:100%;
  margin:8px 0;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1f2937;
  color:white;
  cursor:pointer;
}

.sidebar button:hover {
  background:#334155;
}

.main {
  flex:1;
  padding:20px;
}

.card {
  background:#1f2937;
  padding:15px;
  border-radius:10px;
}

input, textarea {
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:8px;
  border:none;
  background:#0b1220;
  color:white;
}

button.action {
  margin-top:10px;
  padding:10px;
  background:#38bdf8;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.note {
  background:#111827;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

.hidden { display:none; }
</style>
</head>
<body>

<div class="sidebar">
  <h3>📚 SaaS App</h3>
  <button onclick="show('login')">Login</button>
  <button onclick="show('notes')">Notes</button>
  <button onclick="show('calc')">Calculator</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="main">

<!-- LOGIN -->
<div id="login" class="section">
  <div class="card">
    <h2>Login</h2>
    <input id="email" placeholder="Email"/>
    <input id="password" type="password" placeholder="Password"/>
    <button class="action" onclick="signIn()">Login / Signup</button>
  </div>
</div>

<!-- NOTES -->
<div id="notes" class="section hidden">
  <div class="card">
    <h2>Cloud Notes ☁️</h2>
    <input id="title" placeholder="Title"/>
    <textarea id="content" placeholder="Note..."></textarea>
    <button class="action" onclick="addNote()">Save</button>

    <div id="notesList"></div>
  </div>
</div>

<!-- CALCULATOR -->
<div id="calc" class="section hidden">
  <div class="card">
    <h2>Calculator 🧮</h2>
    <input id="a" placeholder="Number 1"/>
    <input id="b" placeholder="Number 2"/>
    <button class="action" onclick="calc()">Add</button>
    <h3 id="result"></h3>
  </div>
</div>

</div>

<!-- SUPABASE -->
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

// ✅ FIXED CONFIG
const supabaseUrl = "https://tvjzmjahyipbihvkemkd.supabase.co";
const supabaseKey = "sb_publishable_ND5M0H9tuFmirts34peHPA_3pwCD-1l";

const supabase = createClient(supabaseUrl, supabaseKey);

let user = null;

// 🔐 LOGIN
window.signIn = async () => {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    const signup = await supabase.auth.signUp({ email, password });
    alert("Account created. Please login again.");
    return;
  }

  user = data.user;
  show("notes");
  loadNotes();
};

// 🚪 LOGOUT
window.logout = async () => {
  await supabase.auth.signOut();
  user = null;
  show("login");
};

// 📝 ADD NOTE
window.addNote = async () => {
  if (!user) return alert("Login first!");

  let title = document.getElementById("title").value;
  let content = document.getElementById("content").value;

  await supabase.from("notes").insert([
    {
      title,
      content,
      user_id: user.id
    }
  ]);

  loadNotes();
};

// 📥 LOAD NOTES
window.loadNotes = async () => {
  const { data } = await supabase
    .from("notes")
    .select("*")
    .eq("user_id", user.id);

  let list = document.getElementById("notesList");
  list.innerHTML = "";

  data.forEach(n => {
    let div = document.createElement("div");
    div.className = "note";
    div.innerHTML = `<b>${n.title}</b><br>${n.content}`;
    list.appendChild(div);
  });
};

// 🧮 CALCULATOR
window.calc = () => {
  let a = Number(document.getElementById("a").value);
  let b = Number(document.getElementById("b").value);
  document.getElementById("result").innerText = "Result: " + (a + b);
};

// UI SWITCH
window.show = (id) => {
  document.querySelectorAll(".section").forEach(s => s.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");

  if (id === "notes" && user) loadNotes();
};
</script>

</body>
</html>
