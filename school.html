<!DOCTYPE html>
<html>
<head>
    <title>School Helper</title>

    <style>

        body {
            font-family: Arial;
            text-align: center;
            background-color: #eef2f7;
            padding: 40px;
        }

        h1 {
            font-size: 40px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            margin: 10px;
            cursor: pointer;
            border-radius: 8px;
        }

        .box {
            background-color: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

    </style>

</head>

<body>

    <h1>📚 School Helper</h1>

    <div class="box">

        <h2>🎲 Random Number Generator</h2>

        <button onclick="generateNumber()">
            Generate Number
        </button>

        <p id="numberResult"></p>

    </div>

    <div class="box">

        <h2>🔐 Password Generator</h2>

        <button onclick="generatePassword()">
            Generate Password
        </button>

        <p id="passwordResult"></p>

    </div>

<script>

function generateNumber() {

    let number =
        Math.floor(Math.random() * 100);

    document.getElementById("numberResult").innerText =
        "Number: " + number;
}

function generatePassword() {

    let chars =
        "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

    let password = "";

    for (let i = 0; i < 10; i++) {

        password +=
            chars[Math.floor(Math.random() * chars.length)];
    }

    document.getElementById("passwordResult").innerText =
        "Password: " + password;
}

</script>

</body>
</html>
